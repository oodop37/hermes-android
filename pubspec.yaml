name: hermes_android
description: "Hermes Agent — Multi-Session Chat via REST API"
publish_to: 'none'
version: 0.1.1+11

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_markdown: ^0.7.6
  google_fonts: ^6.2.1

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.0.0

  # Network
  http: ^1.2.0
  web_socket_channel: ^3.0.0

  # Local storage
  shared_preferences: ^2.3.0
  path_provider: ^2.1.5

  # Data models
  json_annotation: ^4.9.0
  uuid: ^4.5.1

  # Misc
  url_launcher: ^6.3.0
  image_picker: ^1.0.0
  file_selector: ^1.0.0

  # Markdown syntax highlighting
  highlight: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
  assets:
    - assets/
